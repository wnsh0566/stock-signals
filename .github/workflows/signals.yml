# GitHub Actions 워크플로 — repo에서는 .github/workflows/signals.yml 경로에 저장할 것
# 미국 서머타임(DST) 자동 분기: 아침 수집용 cron을 2개 걸고, 잡 안에서 뉴욕이 EDT/EST인지
# 판별해 맞는 쪽만 실행. (미장 마감 16:00 ET = 여름 20:00 UTC / 겨울 21:00 UTC)
name: fetch-signals

on:
  schedule:
    # ── 아침(미국 확정 종가) — 마감 +90분 버퍼 ──
    - cron: "30 21 * * 1-5"   # 여름(EDT)용: UTC 21:30 = KST 06:30
    - cron: "30 22 * * 1-5"   # 겨울(EST)용: UTC 22:30 = KST 07:30
    # ── 저녁(한국 확정 종가) — 한국은 서머타임 없음, 고정 ──
    # 요구: 16:20~30 KST까지 종가 확보(17:00 퇴근 전 30분 검토). 마감 15:30·Naver 종가 ~15:40 확정.
    # GitHub 스케줄러는 정각/30분 등 혼잡시각에 지연·드롭이 극심 → 혼잡시각 회피 + 산탄식 4발로
    # "먼저 붙는 놈이 커밋". 헤더 타임스탬프가 매 실행 바뀌어 diff는 항상 발생(중복 커밋은 무해).
    - cron: "50 6 * * 1-5"    # UTC 06:50 = KST 15:50 (1차·지연 흡수용 최이른 시각)
    - cron: "5 7 * * 1-5"     # UTC 07:05 = KST 16:05
    - cron: "20 7 * * 1-5"    # UTC 07:20 = KST 16:20 (요구 창 하단)
    - cron: "35 7 * * 1-5"    # UTC 07:35 = KST 16:35 (안전망)
  workflow_dispatch: {}        # 수동 실행(테스트) — 항상 실행됨

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: DST gate (미국 서머타임 자동 분기)
        id: gate
        run: |
          # 뉴욕 현재 시간대 약어: 여름=EDT, 겨울=EST
          NY_TZ=$(TZ=America/New_York date +%Z)
          SCHED="${{ github.event.schedule }}"
          echo "NY=$NY_TZ / trigger=[$SCHED]"
          RUN=false
          case "$SCHED" in
            "")                                    RUN=true ;;         # 수동 실행
            "50 6 "*|"5 7 "*|"20 7 "*|"35 7 "*)    RUN=true ;;         # 한국 저녁(산탄식 4발)
            "30 21 "*)         [ "$NY_TZ" = "EDT" ] && RUN=true || true ;;  # 여름 아침
            "30 22 "*)         [ "$NY_TZ" = "EST" ] && RUN=true || true ;;  # 겨울 아침
          esac
          echo "run=$RUN" >> "$GITHUB_OUTPUT"
          [ "$RUN" = "false" ] && echo "→ 계절에 안 맞는 트리거, 스킵" || true

      - uses: actions/checkout@v4
        if: steps.gate.outputs.run == 'true'

      - uses: actions/setup-python@v5
        if: steps.gate.outputs.run == 'true'
        with:
          python-version: "3.12"

      - name: Install deps
        if: steps.gate.outputs.run == 'true'
        run: pip install yfinance finance-datareader

      - name: Fetch signals
        if: steps.gate.outputs.run == 'true'
        run: python fetch_signals.py

      - name: Commit result
        if: steps.gate.outputs.run == 'true'
        run: |
          git config user.name "signals-bot"
          git config user.email "actions@github.com"
          git add signals_data.md
          git diff --cached --quiet || git commit -m "signals: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
