# GitHub Actions 워크플로 — repo에서는 .github/workflows/signals.yml 경로에 저장할 것
# 미국 서머타임(DST) 자동 분기: 아침 수집용 cron을 2개 걸고, 잡 안에서 뉴욕이 EDT/EST인지
# 판별해 맞는 쪽만 실행. (미장 마감 16:00 ET = 여름 20:00 UTC / 겨울 21:00 UTC)
name: fetch-signals

on:
  schedule:
    # ── 아침(미국 확정 종가) — 마감 +90분 버퍼 ──
    - cron: "30 21 * * 1-5"   # 여름(EDT)용: UTC 21:30 = KST 06:30
    - cron: "30 22 * * 1-5"   # 겨울(EST)용: UTC 22:30 = KST 07:30
    # ── 저녁(한국 확정 종가) — 한국은 서머타임 없음, 고정 ──
    # GitHub 스케줄은 지연/드롭이 잦아서 백업 크론을 하나 더 걸어둠.
    # 1차가 정상 커밋됐으면 2차는 diff 없음 → 커밋 없이 종료되므로 중복 무해.
    - cron: "30 7 * * 1-5"    # UTC 07:40 = KST 16:30 (1차)
    - cron: "30 8 * * 1-5"    # UTC 08:40 = KST 17:30 (백업)
  workflow_dispatch: {}        # 수동 실행(테스트) — 항상 실행됨

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: DST gate (미국 서머타임 자동 분기)
        id: gate
        run: |
          # 뉴욕 현재 시간대 약어: 여름=EDT, 겨울=EST
          NY_TZ=$(TZ=America/New_York date +%Z)
          SCHED="${{ github.event.schedule }}"
          echo "NY=$NY_TZ / trigger=[$SCHED]"
          RUN=false
          case "$SCHED" in
            "")                RUN=true ;;                              # 수동 실행
            "40 7 "*|"40 8 "*) RUN=true ;;                              # 한국 저녁(1차+백업)
            "30 21 "*)         [ "$NY_TZ" = "EDT" ] && RUN=true || true ;;  # 여름 아침
            "30 22 "*)         [ "$NY_TZ" = "EST" ] && RUN=true || true ;;  # 겨울 아침
          esac
          echo "run=$RUN" >> "$GITHUB_OUTPUT"
          [ "$RUN" = "false" ] && echo "→ 계절에 안 맞는 트리거, 스킵" || true

      - uses: actions/checkout@v4
        if: steps.gate.outputs.run == 'true'

      - uses: actions/setup-python@v5
        if: steps.gate.outputs.run == 'true'
        with:
          python-version: "3.12"

      - name: Install deps
        if: steps.gate.outputs.run == 'true'
        run: pip install yfinance

      - name: Fetch signals
        if: steps.gate.outputs.run == 'true'
        run: python fetch_signals.py

      - name: Commit result
        if: steps.gate.outputs.run == 'true'
        run: |
          git config user.name "signals-bot"
          git config user.email "actions@github.com"
          git add signals_data.md
          git diff --cached --quiet || git commit -m "signals: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
